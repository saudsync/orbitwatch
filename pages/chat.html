<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ARIA — Space AI</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  .api-bar {
    background: rgba(123,97,255,.1);
    border: 1px solid rgba(123,97,255,.3);
    border-radius: 10px;
    padding: 10px 16px;
    margin: 12px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 12px;
  }
  .api-bar input {
    flex: 1;
    background: #0d1830;
    border: 1px solid rgba(123,97,255,.3);
    border-radius: 6px;
    color: #e8f4ff;
    padding: 6px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
  }
  .api-bar button {
    background: #7b61ff;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 11px;
    cursor: pointer;
  }
  .api-status { font-size: 10px; }
  .status-ok { color: #00ff9d; }
  .status-err { color: #ff4560; }
  .chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg { display: flex; gap: 10px; max-width: 80%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .msg-avatar.ai { background: linear-gradient(135deg, #7b61ff, #00d4ff); }
  .msg-avatar.user { background: #101e38; border: 1px solid rgba(100,180,255,0.2); }
  .msg-bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.5;
  }
  .msg.ai .msg-bubble {
    background: #080f1e;
    border: 1px solid rgba(0,212,255,.2);
    border-top-left-radius: 3px;
  }
  .msg.user .msg-bubble {
    background: rgba(0,212,255,.1);
    border: 1px solid rgba(0,212,255,.2);
    border-top-right-radius: 3px;
  }
  .msg-bubble p { margin: 0 0 6px; }
  .msg-bubble p:last-child { margin: 0; }
  .msg-bubble strong { color: #00d4ff; }
  .typing-dots {
    display: flex;
    gap: 4px;
    padding: 4px 0;
  }
  .typing-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #5a7a9a;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
  .suggestions {
    padding: 8px 20px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    border-top: 1px solid rgba(100,180,255,0.12);
  }
  .suggestion {
    background: #0d1830;
    border: 1px solid rgba(100,180,255,0.2);
    border-radius: 16px;
    padding: 5px 12px;
    font-size: 11px;
    cursor: pointer;
    transition: all .2s;
  }
  .suggestion:hover {
    border-color: #7b61ff;
    color: #7b61ff;
  }
  .input-row {
    padding: 12px 20px 20px;
    border-top: 1px solid rgba(100,180,255,0.12);
    display: flex;
    gap: 10px;
    background: #030610;
  }
  .input-row textarea {
    flex: 1;
    background: #0d1830;
    border: 1px solid rgba(100,180,255,0.2);
    border-radius: 10px;
    color: #e8f4ff;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 10px 14px;
    resize: none;
    outline: none;
  }
  .input-row textarea:focus { border-color: #7b61ff; }
  .input-row button {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, #7b61ff, #00d4ff);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 18px;
    cursor: pointer;
  }
  .input-row button:disabled { opacity: 0.4; cursor: not-allowed; }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .empty-sub { color: #5a7a9a; font-size: 12px; }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="../index.html" class="logo"><span class="logo-dot"></span>Orbit<span class="logo-light">Watch</span></a>
    <nav class="site-nav">
      <a href="../index.html" class="nav-link">Home</a>
      <a href="tracker.html" class="nav-link">Tracker</a>
      <a href="database.html" class="nav-link">Database</a>
      <a href="chat.html" class="nav-link nav-ai active">🤖 AI Chat</a>
    </nav>
    <div class="live-badge"><span class="live-dot"></span>LIVE</div>
    <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
  </div>
  <div class="mobile-nav" id="mobileNav">
    <a href="../index.html" class="nav-link">Home</a>
    <a href="tracker.html" class="nav-link">Tracker</a>
    <a href="database.html" class="nav-link">Database</a>
    <a href="chat.html" class="nav-link active">🤖 AI Chat</a>
  </div>
</header>

<div class="chat-page" style="display:flex;flex-direction:column;height:100vh;padding-top:60px;">

  <div style="padding:12px 20px;border-bottom:1px solid rgba(100,180,255,0.12);display:flex;align-items:center;gap:12px;">
    <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#7b61ff,#00d4ff);display:flex;align-items:center;justify-content:center;font-size:18px;">🔭</div>
    <div>
      <div style="font-weight:700;">ARIA</div>
      <div style="font-size:10px;color:#5a7a9a;" id="agentStatus">Ready</div>
    </div>
    <button id="clearChat" style="margin-left:auto;background:none;border:1px solid rgba(100,180,255,0.2);color:#5a7a9a;border-radius:6px;padding:5px 10px;font-size:10px;cursor:pointer;">Clear</button>
  </div>

  <div class="api-bar">
    <span>🔑 OpenRouter Key:</span>
    <input type="password" id="apiKeyInput" placeholder="sk-or-v1-..."/>
    <button id="saveApiKey">Save</button>
    <button id="clearApiKey" style="display:none">Remove</button>
    <span class="api-status" id="apiStatus">No key</span>
  </div>

  <div class="chat-body" id="chatBody">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🌌</div>
      <div class="empty-title">Ask ARIA</div>
      <div class="empty-sub">Satellites · ISRO · Black Holes · Orbits</div>
    </div>
  </div>

  <div class="suggestions">
    <span class="suggestion" onclick="askSuggestion(this)">ISS orbit</span>
    <span class="suggestion" onclick="askSuggestion(this)">CARTOSAT-2F</span>
    <span class="suggestion" onclick="askSuggestion(this)">NavIC</span>
    <span class="suggestion" onclick="askSuggestion(this)">Black holes</span>
    <span class="suggestion" onclick="askSuggestion(this)">ISRO achievements</span>
    <span class="suggestion" onclick="askSuggestion(this)">Geostationary orbit</span>
  </div>

  <div class="input-row">
    <textarea id="chatInput" placeholder="Ask about space..." rows="1"></textarea>
    <button id="sendBtn">➤</button>
  </div>

</div>

<script>
// CONFIG
const API_KEY = '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';
const OR_ENDPOINT = 'https://openrouter.ai/api/v1/chat/completions';
const MODEL = 'meta-llama/llama-3-8b-instruct:free';

let savedKey = localStorage.getItem('openrouter_key') || API_KEY;
let history = [];
let loading = false;

// System prompt
const SYSTEM = `You are ARIA, an astronomy expert for OrbitWatch. Answer space questions clearly and concisely. Use **bold** for key terms. Keep answers short (2-3 paragraphs).`;

// UI Functions
function updateUI() {
  const hasKey = savedKey && savedKey !== '';
  const statusEl = document.getElementById('apiStatus');
  const clearBtn = document.getElementById('clearApiKey');
  const agentStatus = document.getElementById('agentStatus');
  
  if (hasKey) {
    statusEl.textContent = '✓ Active';
    statusEl.className = 'api-status status-ok';
    clearBtn.style.display = 'inline-block';
    agentStatus.textContent = 'Online · Llama 3';
  } else {
    statusEl.textContent = 'No key';
    statusEl.className = 'api-status status-err';
    clearBtn.style.display = 'none';
    agentStatus.textContent = 'Add API key';
  }
}

document.getElementById('saveApiKey').onclick = () => {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (val) {
    savedKey = val;
    localStorage.setItem('openrouter_key', val);
    updateUI();
    document.getElementById('apiKeyInput').value = '';
    addMessage('ai', '✅ Key saved! Ask me anything about space.');
  }
};

document.getElementById('clearApiKey').onclick = () => {
  savedKey = '';
  localStorage.removeItem('openrouter_key');
  updateUI();
  addMessage('ai', '🔑 Key removed. Add a new key from openrouter.ai/keys');
};

// Message rendering
function hideEmpty() {
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
}

function addMessage(role, content, isError = false) {
  hideEmpty();
  const body = document.getElementById('chatBody');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  
  let formatted = content
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br/>');
  
  div.innerHTML = `
    <div class="msg-avatar ${role}">${role === 'ai' ? '🔭' : '👤'}</div>
    <div class="msg-bubble" style="${isError ? 'border-color:#ff4560!important;background:rgba(255,69,96,.05)!important;' : ''}">
      ${formatted}
    </div>
  `;
  body.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function showTyping() {
  hideEmpty();
  const body = document.getElementById('chatBody');
  const div = document.createElement('div');
  div.id = 'typing';
  div.className = 'msg ai';
  div.innerHTML = `
    <div class="msg-avatar ai">🔭</div>
    <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
  `;
  body.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function hideTyping() {
  const typing = document.getElementById('typing');
  if (typing) typing.remove();
}

// API Call
async function callAI(userMsg) {
  const response = await fetch(OR_ENDPOINT, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${savedKey}`
    },
    body: JSON.stringify({
      model: MODEL,
      messages: [
        { role: 'system', content: SYSTEM },
        ...history.slice(-10),
        { role: 'user', content: userMsg }
      ],
      max_tokens: 512,
      temperature: 0.7
    })
  });

  if (!response.ok) {
    const error = await response.json().catch(() => ({}));
    throw new Error(error.error?.message || `HTTP ${response.status}`);
  }

  const data = await response.json();
  return data.choices[0].message.content.trim();
}

// Send message
async function sendMessage(text) {
  if (!text.trim() || loading) return;
  
  loading = true;
  document.getElementById('sendBtn').disabled = true;
  
  addMessage('user', text);
  showTyping();
  
  if (!savedKey) {
    setTimeout(() => {
      hideTyping();
      addMessage('ai', '⚠️ Add your OpenRouter API key above.\n\nGet one free at openrouter.ai/keys');
      loading = false;
      document.getElementById('sendBtn').disabled = false;
    }, 500);
    return;
  }
  
  try {
    const reply = await callAI(text);
    hideTyping();
    addMessage('ai', reply);
    history.push({ role: 'user', content: text }, { role: 'assistant', content: reply });
    if (history.length > 20) history = history.slice(-20);
  } catch (err) {
    hideTyping();
    console.error(err);
    let errMsg = err.message;
    if (errMsg.includes('401')) errMsg = 'Invalid API key. Check your key at openrouter.ai/keys';
    if (errMsg.includes('402')) errMsg = 'Free tier issue. Try a different free model';
    if (errMsg.includes('429')) errMsg = 'Rate limit. Wait 30 seconds';
    addMessage('ai', `⚠️ ${errMsg}`, true);
  }
  
  loading = false;
  document.getElementById('sendBtn').disabled = false;
}

// Helpers
function askSuggestion(el) {
  document.getElementById('chatInput').value = el.textContent;
  sendAndClear();
}

function sendAndClear() {
  const inp = document.getElementById('chatInput');
  const text = inp.value.trim();
  if (text) {
    inp.value = '';
    inp.style.height = 'auto';
    sendMessage(text);
  }
}

// Event listeners
document.getElementById('sendBtn').onclick = sendAndClear;
document.getElementById('chatInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendAndClear();
  }
});
document.getElementById('chatInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
document.getElementById('clearChat').onclick = () => {
  history = [];
  document.getElementById('chatBody').innerHTML = `
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🌌</div>
      <div class="empty-title">Ask ARIA</div>
      <div class="empty-sub">Satellites · ISRO · Black Holes · Orbits</div>
    </div>
  `;
};

document.getElementById('mobileMenuBtn')?.addEventListener('click', () => {
  document.getElementById('mobileNav')?.classList.toggle('open');
});

// Init
updateUI();
setTimeout(() => {
  addMessage('ai', '👋 Hi! I\'m ARIA. Ask me about satellites, ISRO missions, black holes, or anything space-related.');
}, 300);
</script>
</body>
</html>
