<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ARIA — Space AI Assistant</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  .chat-iframe-container {
    flex: 1;
    width: 100%;
    background: #030610;
  }
  
  .chat-iframe-container iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: #030610;
  }
  
  .chat-page {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding-top: 60px;
  }
  
  .chat-header {
    padding: 12px 20px;
    border-bottom: 1px solid rgba(100,180,255,0.12);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  
  .chat-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7b61ff, #00d4ff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  
  .status-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 12px;
    background: rgba(0,255,157,.15);
    color: #00ff9d;
  }
  
  .suggestions {
    padding: 8px 20px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    border-top: 1px solid rgba(100,180,255,0.12);
    border-bottom: 1px solid rgba(100,180,255,0.12);
    flex-shrink: 0;
  }
  
  .suggestion {
    background: #0d1830;
    border: 1px solid rgba(100,180,255,0.2);
    border-radius: 16px;
    padding: 5px 12px;
    font-size: 11px;
    cursor: pointer;
    transition: all .2s;
  }
  
  .suggestion:hover {
    border-color: #7b61ff;
    color: #7b61ff;
  }
  
  /* Hide empty state when iframe loads */
  .empty-state {
    display: none;
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="../index.html" class="logo"><span class="logo-dot"></span>Orbit<span class="logo-light">Watch</span></a>
    <nav class="site-nav">
      <a href="../index.html" class="nav-link">Home</a>
      <a href="tracker.html" class="nav-link">Tracker</a>
      <a href="database.html" class="nav-link">Database</a>
      <a href="chat.html" class="nav-link nav-ai active">🤖 AI Chat</a>
    </nav>
    <div class="live-badge"><span class="live-dot"></span>LIVE</div>
    <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
  </div>
  <div class="mobile-nav" id="mobileNav">
    <a href="../index.html" class="nav-link">Home</a>
    <a href="tracker.html" class="nav-link">Tracker</a>
    <a href="database.html" class="nav-link">Database</a>
    <a href="chat.html" class="nav-link active">🤖 AI Chat</a>
  </div>
</header>

<div class="chat-page">

  <div class="chat-header">
    <div class="chat-avatar">🔭</div>
    <div>
      <div style="font-weight:700;">ARIA — Space AI Assistant</div>
      <div style="font-size:10px;color:#5a7a9a;display:flex;align-items:center;gap:6px;">
        <span>Powered by Blackbox.ai</span>
        <span class="status-badge">● Free · No API Key</span>
      </div>
    </div>
  </div>

  <div class="suggestions">
    <span class="suggestion" onclick="sendToBlackbox('How does the ISS orbit Earth?')">🛰️ ISS orbit</span>
    <span class="suggestion" onclick="sendToBlackbox('Tell me about ISRO CARTOSAT-2F satellite')">🇮🇳 CARTOSAT-2F</span>
    <span class="suggestion" onclick="sendToBlackbox('What is NavIC? Explain India navigation system')">🧭 NavIC</span>
    <span class="suggestion" onclick="sendToBlackbox('Explain black holes in simple terms')">🌌 Black holes</span>
    <span class="suggestion" onclick="sendToBlackbox('What are ISRO greatest achievements?')">🚀 ISRO achievements</span>
    <span class="suggestion" onclick="sendToBlackbox('What is geostationary orbit?')">📡 Geostationary orbit</span>
  </div>

  <!-- Blackbox.ai embedded directly - works on GitHub Pages! -->
  <div class="chat-iframe-container">
    <iframe 
      src="https://www.blackbox.ai/embed" 
      title="Blackbox AI Assistant"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>

</div>

<script>
  // Function to try to communicate with Blackbox iframe
  // Note: Due to cross-origin restrictions, this attempts to help but may be limited
  function sendToBlackbox(question) {
    // Try to find the iframe and send message
    const iframe = document.querySelector('iframe');
    if (iframe && iframe.contentWindow) {
      // Attempt to send message (may be blocked by CORS, but some iframes accept it)
      try {
        iframe.contentWindow.postMessage({
          type: 'question',
          text: question
        }, 'https://www.blackbox.ai');
      } catch(e) {
        console.log('Cannot send directly, opening new tab instead');
      }
    }
    
    // Alternative: Open Blackbox in new tab with the question
    // This always works as a fallback
    window.open(`https://www.blackbox.ai/?q=${encodeURIComponent(question)}`, '_blank');
  }
  
  // Mobile menu toggle
  document.getElementById('mobileMenuBtn')?.addEventListener('click', () => {
    document.getElementById('mobileNav')?.classList.toggle('open');
  });
</script>

</body>
</html>
